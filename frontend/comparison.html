<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Places — Stay or Leave</title>
  <meta name="description" content="Compare two countries, cities, companies, or colleges across cost of living, salary, safety, healthcare, and more.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/comparison.css">
</head>
<body>
  <div class="split-line" aria-hidden="true"></div>

  <header id="site-navbar" class="navbar" data-active="comparison.html"></header>

  <main>
    <section class="section section--tight">
      <div class="container">
        <span class="eyebrow">Side by side</span>
        <h1 class="section-title reveal">Compare two places</h1>
        <p class="section-lede reveal">Pick anything — two countries, two cities, two companies, two colleges — and see the factors that actually separate them.</p>

        <form id="compare-form" class="compare-setup">
          <div class="place-picker">
            <div class="field" style="margin-bottom:0;">
              <label for="place-a-input">Place A</label>
              <input type="text" id="place-a-input" placeholder="e.g. Canada" autocomplete="off" required>
            </div>
            <div class="place-picker__results" id="place-a-results"></div>
          </div>

          <span class="compare-setup__vs">vs</span>

          <div class="place-picker">
            <div class="field" style="margin-bottom:0;">
              <label for="place-b-input">Place B</label>
              <input type="text" id="place-b-input" placeholder="e.g. Germany" autocomplete="off" required>
            </div>
            <div class="place-picker__results" id="place-b-results"></div>
          </div>

          <input type="hidden" id="place-a-id">
          <input type="hidden" id="place-b-id">
        </form>

        <button type="submit" form="compare-form" class="btn btn--primary" id="compare-submit-btn" style="margin-bottom:var(--space-7);">
          Compare now
        </button>

        <div id="compare-results"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/comparison.js"></script>
</body>
</html>
