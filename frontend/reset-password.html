<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set a new password — Stay or Leave</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <header id="site-navbar" class="navbar" data-active="login.html"></header>

  <main class="auth-wrap">
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Set a new password</h1>
        <p class="auth-sub">Choose a new password for your account.</p>

        <form id="reset-form" novalidate>
          <div class="field" id="password-field">
            <label for="password">New password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
            <div class="password-strength" id="password-strength"><i></i><i></i><i></i></div>
            <p class="field-hint">At least 8 characters, with a letter and a number.</p>
            <p class="field-error">Password doesn't meet the requirements above</p>
          </div>

          <button type="submit" class="btn btn--primary btn--block" id="reset-submit-btn">Update password</button>
        </form>

        <p class="auth-foot"><a href="login.html">Back to log in</a></p>
      </div>
    </div>

    <div class="auth-visual" aria-hidden="true">
      <div class="auth-visual__divider"></div>
      <blockquote class="auth-visual__quote">"Almost there — one more step back in."</blockquote>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
