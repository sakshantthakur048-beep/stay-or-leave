<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password — Stay or Leave</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <header id="site-navbar" class="navbar" data-active="login.html"></header>

  <main class="auth-wrap">
    <div class="auth-panel">
      <div class="auth-card">
        <h1>Reset your password</h1>
        <p class="auth-sub">Enter the email on your account and we'll send a link to reset your password.</p>

        <form id="forgot-form" novalidate>
          <div class="field" id="email-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
            <p class="field-error">Enter a valid email address</p>
          </div>

          <button type="submit" class="btn btn--primary btn--block" id="forgot-submit-btn">Send reset link</button>
        </form>

        <p class="auth-foot">Remembered it after all? <a href="login.html">Back to log in</a></p>
      </div>
    </div>

    <div class="auth-visual" aria-hidden="true">
      <div class="auth-visual__divider"></div>
      <blockquote class="auth-visual__quote">
        "Every big decision starts with one small question. Asking for help with this one is no different."
      </blockquote>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
